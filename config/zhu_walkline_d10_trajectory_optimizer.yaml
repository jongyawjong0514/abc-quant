mode: shadow_observation_only
formal_trade_effect: false

analysis:
  signal_start: "2026-01-01"
  signal_end: "2026-06-30"
  discovery_start: "2026-01-01"
  discovery_end: "2026-02-28"
  validation_start: "2026-03-01"
  validation_end: "2026-04-30"
  holdout_start: "2026-05-01"
  holdout_end: "2026-06-30"
  target_return_pct: 10.0
  large_gain_return_pct: 20.0
  same_stock_cooldown_trade_days: 5
  maximum_lead_trading_days: 10
  earliest_rule_minimum_lead_days: 2
  earliest_rule_maximum_lead_days: 10

search_grid:
  max_k: [20.0, 30.0, 40.0, 100.0]
  min_k_change_1d: [0.0, 1.0, 2.0]
  min_daily_return_pct: [-1.0, 0.0, 1.0]
  max_volume_ratio_20: [0.6, 0.8, 1.0, 1.2]
  max_close_to_sma20_pct: [0.0, 3.0, 6.0]
  max_distance_from_trailing_5d_low_pct: [2.0, 4.0, 8.0]

selection:
  minimum_discovery_rows: 20
  minimum_validation_rows: 20
  minimum_holdout_rows: 20
  discovery_shortlist_size: 20
  precision_noninferiority_margin: 0.02
  balanced_accuracy_noninferiority_margin: 0.02
  loss_rate_tolerance: 0.05
  require_recall_nonregression: true
  require_all_months_nonempty: true

governance:
  research_scope: event_conditioned_retrospective
  live_deployable: false
  next_required_gate: full_market_daily_replay_with_point_in_time_candidate_universe
  promotion_decision: blocked_before_promotion_review
